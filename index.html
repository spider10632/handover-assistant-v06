<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工作交接助手</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="工作交接助手" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
    <link rel="shortcut icon" href="assets/icons/icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css?v=20260410-08" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <div id="password-gate" class="password-gate">
      <form id="password-form" class="password-card" autocomplete="off">
        <p class="password-eyebrow">SECURE ACCESS</p>
        <h1 id="password-title">工作交接助手</h1>
          <p id="password-subtitle" class="password-subtitle">請輸入使用者後進入系統（不同使用者為獨立資料庫）</p>
          <label id="password-label" for="password-input">使用者（英數、-、_）</label>
          <input id="password-input" type="text" inputmode="text" required />
        <p id="password-error" class="password-error hidden"></p>
        <button id="password-submit" class="btn btn-primary" type="submit">進入系統</button>
      </form>
    </div>

    <main class="app">
      <div class="language-bar">
        <label id="ui-language-label" for="ui-language-select">介面</label>
        <select id="ui-language-select" aria-label="介面語言">
          <option value="zh" selected>中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="top-panels">
        <section class="panel animate-up delay-1">
          <div class="today-head-row">
            <h2 class="section-title">
              <i class="ti ti-calendar-star title-icon" aria-hidden="true"></i>
              <span id="today-section-title">當日事項</span>
            </h2>
            <div class="today-kpi-row">
              <span id="today-date-label" class="today-kpi-chip">當日日期：<strong id="today-auto-date">-</strong></span>
              <label class="today-kpi-field" for="today-expected-checkin">
                <span id="today-checkin-label">預進</span>
                <input id="today-expected-checkin" type="number" min="0" step="1" inputmode="numeric" placeholder="0" />
              </label>
              <label class="today-kpi-field" for="today-expected-checkout">
                <span id="today-checkout-label">預退</span>
                <input id="today-expected-checkout" type="number" min="0" step="1" inputmode="numeric" placeholder="0" />
              </label>
              <label class="today-kpi-field" for="today-occupancy-rate">
                <span id="today-occ-label">住房率</span>
                <input id="today-occupancy-rate" type="text" inputmode="decimal" placeholder="例: 99.47" />
              </label>
              <button id="today-overview-save-btn" class="btn btn-ghost today-kpi-save-btn" type="button">儲存</button>
            </div>
          </div>

          <div class="today-pinned-zone">
            <p id="today-pinned-title" class="today-pinned-title">置頂區</p>
            <ul id="today-pinned-list" class="today-pinned-list">
              <li class="today-pinned-empty">目前沒有置頂事項。</li>
            </ul>
          </div>

          <div class="today-toolbar">
            <p id="today-task-summary" class="today-summary">今日共 0 筆事項。</p>
            <label class="today-filter">
              <span id="today-filter-label">主分類</span>
              <select id="today-category-filter">
                <option value="all" selected>全部主分類</option>
                <option value="廣場">廣場</option>
                <option value="包裹代收">包裹代收</option>
                <option value="車輛安排">車輛安排</option>
                <option value="大廳">大廳</option>
                <option value="會議室">會議室</option>
                <option value="團桌">團桌</option>
                <option value="客房">客房</option>
                <option value="預訂">預訂</option>
                <option value="餐飲部">餐飲部</option>
                <option value="待回覆信件">待回覆信件</option>
                <option value="郵寄">郵寄</option>
                <option value="行政">行政</option>
                <option value="公告">公告</option>
                <option value="遺留物">遺留物</option>
              </select>
            </label>
          </div>

          <ul id="today-task-list" class="today-list">
            <li class="today-empty">今日沒有排程事項。</li>
          </ul>
        </section>

        <section class="panel animate-up delay-2">
          <h2 class="section-title">
            <i class="ti ti-notes title-icon" aria-hidden="true"></i>
            <span id="task-form-title">新增交接待辦</span>
          </h2>
          <form id="task-form" class="task-form">
            <label>
              <span id="task-category-label">主分類</span>
              <select id="task-category" name="category" required>
                <option value="" disabled selected>請選擇主分類</option>
                <option value="廣場">廣場</option>
                <option value="包裹代收">包裹代收</option>
                <option value="車輛安排">車輛安排</option>
                <option value="大廳">大廳</option>
                <option value="會議室">會議室</option>
                <option value="團桌">團桌</option>
                <option value="客房">客房</option>
                <option value="預訂">預訂</option>
                <option value="餐飲部">餐飲部</option>
                <option value="待回覆信件">待回覆信件</option>
                <option value="郵寄">郵寄</option>
                <option value="行政">行政</option>
                <option value="公告">公告</option>
                <option value="遺留物">遺留物</option>
              </select>
            </label>

            <label>
              <span id="task-subcategory-label">子分類</span>
              <select id="task-subcategory" name="subcategory" disabled>
                <option value="">請先選主分類</option>
              </select>
            </label>

            <p id="category-tip" class="category-tip full-width">請先選主分類，再填寫其餘欄位。</p>

            <label>
              <span id="task-title-label">事項名稱</span>
              <input id="task-title" name="title" type="text" placeholder="例：房號、客人姓名、團體名稱等" required />
            </label>

            <label class="task-time-field">
              <span id="task-time-label">時間（可跨日：起日/起時 至 迄日/迄時，可留空）</span>
              <div class="due-input-row">
                <input id="task-start-date" name="taskStartDate" type="date" />
                <input
                  id="task-start-at"
                  name="startAt"
                  type="text"
                  inputmode="numeric"
                  maxlength="4"
                  pattern="([0-9]{4}|[0-9]{2}:[0-9]{2})"
                  placeholder="HHMM"
                />
                <span id="time-range-sep" class="time-range-sep">至</span>
                <input id="task-end-date" name="taskEndDate" type="date" />
                <input
                  id="task-end-at"
                  name="endAt"
                  type="text"
                  inputmode="numeric"
                  maxlength="4"
                  pattern="([0-9]{4}|[0-9]{2}:[0-9]{2})"
                  placeholder="HHMM"
                />
                <button id="all-day-btn" class="btn btn-ghost all-day-btn" type="button" aria-pressed="false">全日</button>
              </div>
            </label>

            <label class="task-owner-field">
              <span id="task-owner-label">填寫人</span>
              <input id="task-owner" name="owner" type="text" placeholder="例：王小明" required />
            </label>

            <label class="pin-option full-width">
              <span id="task-pin-label">置頂顯示</span>
              <span class="inline-checkbox">
                <input id="task-pinned" name="pinned" type="checkbox" />
                <span id="task-pin-help">一直顯示在網頁上</span>
              </span>
            </label>

            <label class="full-width">
              <span id="task-desc-label">交接說明</span>
              <textarea id="task-description" name="description" rows="3" placeholder="補充細節、檔案位置、提醒事項"></textarea>
            </label>

            <div class="form-actions full-width">
              <button id="add-task-btn" class="btn btn-primary" type="submit">新增待辦</button>
              <button id="clear-form-btn" class="btn btn-ghost" type="button">清空</button>
              <button id="cancel-edit-btn" class="btn btn-ghost hidden" type="button">取消修改</button>
            </div>
          </form>
        </section>
      </div>

      <div class="bottom-panels animate-up delay-3">
        <section id="query-panel" class="panel panel-collapsible">
          <div class="panel-heading">
            <h2 class="section-title section-title-sm">
              <i class="ti ti-calendar-search title-icon" aria-hidden="true"></i>
              <span id="query-panel-title">日期查詢</span>
            </h2>
            <button
              id="toggle-query-panel"
              class="btn btn-ghost panel-toggle-btn"
              type="button"
              data-target="query-panel"
              aria-expanded="true"
            >
              收合
            </button>
          </div>

          <div class="panel-body">
            <div class="query-bar">
              <input id="query-date" type="date" />
              <select id="query-status" aria-label="狀態篩選">
                <option value="all" selected>全部狀態</option>
                <option value="pending">未完成</option>
                <option value="done">已完成</option>
              </select>
              <select id="query-category" aria-label="主分類查詢">
                <option value="all" selected>全部主分類</option>
              </select>
              <input id="query-keyword" type="text" placeholder="關鍵字查詢（事項/說明/填寫人）" />
              <button id="search-btn" class="btn btn-secondary" type="button">查詢</button>
              <button id="clear-search-btn" class="btn btn-ghost" type="button">清除</button>
            </div>
            <p id="query-result-text" class="query-result">目前顯示全部待辦。</p>
          </div>
        </section>

        <section id="task-list-panel" class="panel panel-collapsible is-collapsed">
          <div class="panel-heading">
            <h2 class="section-title section-title-sm">
              <i class="ti ti-list-details title-icon" aria-hidden="true"></i>
              <span id="result-panel-title">查詢結果</span>
            </h2>
            <div class="panel-heading-right">
              <label class="inline-filter" for="task-list-filter">
                <span id="task-list-filter-label">篩選</span>
                <select id="task-list-filter" aria-label="查詢結果篩選">
                  <option value="all" selected>全部</option>
                  <option value="pending">未完成</option>
                  <option value="done">已完成</option>
                  <option value="pinned">置頂中</option>
                </select>
              </label>
              <button
                id="toggle-task-list-panel"
                class="btn btn-ghost panel-toggle-btn"
                type="button"
                data-target="task-list-panel"
                aria-expanded="false"
              >
                展開
              </button>
            </div>
          </div>

          <div class="panel-body">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>狀態</th>
                    <th>置頂</th>
                    <th>主分類</th>
                    <th>子分類</th>
                    <th>事項</th>
                    <th>填寫人</th>
                    <th>完成人</th>
                    <th>時間</th>
                    <th>交接說明</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="task-table-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>

      <section class="panel export-panel animate-up delay-4">
        <div class="export-actions">
          <label class="export-filter">
            <span id="export-date-label">匯出日期</span>
            <input id="export-date" type="date" />
          </label>
          <label class="export-filter">
            <span id="export-status-label">匯出狀態</span>
            <select id="export-status">
              <option value="all" selected>全部狀態</option>
              <option value="pending">未完成</option>
              <option value="done">已完成</option>
            </select>
          </label>
          <button id="export-word-btn" class="btn btn-primary" type="button">一鍵生成 Word</button>
          <button id="export-excel-btn" class="btn btn-secondary" type="button">一鍵生成 Excel</button>
        </div>
      </section>
    </main>

    <div class="app-version">VERSION 0.95</div>

    <aside id="upcoming-board" class="upcoming-board" aria-live="polite">
      <div class="upcoming-head">
        <h3 id="upcoming-title">下一件待辦提醒</h3>
        <button id="mobile-upcoming-close" class="btn btn-ghost mobile-upcoming-close" type="button">關閉</button>
      </div>
      <p id="upcoming-summary" class="upcoming-summary">目前沒有 1 小時內待辦。</p>
      <ul id="upcoming-task-list" class="upcoming-task-list">
        <li class="upcoming-empty">30 分鐘與 1 小時提醒區目前無待辦。</li>
      </ul>
      <div class="reminder-controls">
        <label class="checkbox">
          <input id="notification-toggle" type="checkbox" checked />
          <span id="notification-toggle-label">通知開啟</span>
        </label>
        <button id="request-notification-btn" class="btn btn-secondary" type="button">授權通知</button>
      </div>
    </aside>

    <div id="mobile-upcoming-overlay" class="mobile-upcoming-overlay" aria-hidden="true"></div>
    <button id="mobile-add-btn" class="mobile-add-btn" type="button" aria-label="前往新增交接待辦">
      <span aria-hidden="true">+</span>
    </button>
    <button id="mobile-upcoming-toggle" class="mobile-upcoming-toggle" type="button" aria-expanded="false" aria-controls="upcoming-board">
      <i class="ti ti-bell-ringing" aria-hidden="true"></i>
      <span id="mobile-upcoming-toggle-text" class="mobile-upcoming-toggle-text">下一件待辦</span>
      <span id="mobile-upcoming-badge" class="mobile-upcoming-badge hidden">0</span>
    </button>
    <button id="mobile-top-btn" class="mobile-top-btn" type="button" aria-label="回到頂部">
      <i class="ti ti-arrow-up" aria-hidden="true"></i>
      <span>TOP</span>
    </button>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js" defer></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script>
      window.HANDOVER_CLOUD_API_BASE = "https://handover-cloud-api.spider10632.workers.dev";
    </script>
    <script src="app.js?v=20260410-09" defer></script>
  </body>
</html>
