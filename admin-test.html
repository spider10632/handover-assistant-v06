<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>交接後台管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fbf9f4;
        --panel: #ffffff;
        --border: #d8cebf;
        --text: #1b1c19;
        --muted: #6e6659;
        --gold: #c5a059;
        --gold-deep: #a57f3a;
        --danger: #9f4a4a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Manrope", "Noto Sans TC", sans-serif;
        background: linear-gradient(160deg, #f5f2ea, #fbf9f4 40%, #f8f5ee);
        color: var(--text);
      }
      .wrap {
        width: min(1180px, 96vw);
        margin: 24px auto 40px;
      }
      h1,
      h2 {
        margin: 0;
        font-family: "Noto Serif TC", serif;
        letter-spacing: 0.02em;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 8px 24px rgba(35, 28, 16, 0.04);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid.main {
        grid-template-columns: 1fr;
      }
      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .grid.audit-filters {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 14px;
      }
      input,
      select,
      button,
      textarea {
        font: inherit;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fbfaf7;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(197, 160, 89, 0.18);
      }
      .btn {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 14px;
        background: #f3f0e9;
        color: #463619;
        cursor: pointer;
        font-weight: 600;
      }
      .btn.primary {
        background: linear-gradient(120deg, #c5a059, #b79048);
        border-color: #ad8945;
        color: #fff;
      }
      .btn.danger {
        border-color: rgba(159, 74, 74, 0.4);
        color: var(--danger);
        background: #f7eeee;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .toolbar {
        justify-content: space-between;
      }
      .status {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .status.error {
        color: var(--danger);
      }
      .status.ok {
        color: #2f6b44;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #e9e2d5;
        text-align: left;
        padding: 10px 8px;
        vertical-align: middle;
        font-size: 14px;
      }
      th {
        color: #64563b;
        background: #fbf8f1;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(197, 160, 89, 0.14);
        border: 1px solid rgba(197, 160, 89, 0.42);
        color: #6b4f17;
        font-size: 12px;
        font-weight: 700;
      }
      .hidden {
        display: none !important;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .cell-details {
        max-width: 460px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #51462f;
      }
      @media (max-width: 820px) {
        .wrap {
          width: min(1120px, 94vw);
        }
        th,
        td {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap grid main">
      <section class="card grid" id="login-card">
        <h1>交接後台管理</h1>
        <p class="status">登入後可管理帳號與查看操作紀錄（僅 `admin` 可用）。</p>
        <div class="grid two">
          <label>
            伺服器
            <input id="login-server" type="text" value="test" />
          </label>
          <label>
            密碼
            <input id="login-password" type="password" />
          </label>
        </div>
        <div class="row">
          <button id="login-btn" class="btn primary" type="button">登入</button>
          <span id="login-status" class="status"></span>
        </div>
      </section>

      <section class="card hidden" id="admin-app">
        <div class="row toolbar">
          <h2>帳號管理</h2>
          <div class="row">
            <span class="badge">Server: <span id="meta-server" class="mono" style="margin-left: 6px">-</span></span>
            <span class="badge">Admin: <span id="meta-user" class="mono" style="margin-left: 6px">-</span></span>
            <button id="logout-btn" class="btn" type="button">登出</button>
          </div>
        </div>

        <div class="card" style="margin-top: 14px; background: #fdfbf7">
          <h2 style="margin-bottom: 10px">新增帳號</h2>
          <div class="grid two">
            <label>
              帳號（英數、-、_）
              <input id="new-username" type="text" />
            </label>
            <label>
              密碼
              <input id="new-password" type="password" />
            </label>
            <label>
              角色
              <select id="new-role">
                <option value="staff">staff</option>
                <option value="manager">manager</option>
                <option value="admin">admin</option>
              </select>
            </label>
          </div>
          <div class="row" style="margin-top: 10px">
            <button id="create-btn" class="btn primary" type="button">新增帳號</button>
            <span id="create-status" class="status"></span>
          </div>
        </div>

        <div class="row toolbar" style="margin-top: 16px">
          <h2>帳號列表</h2>
          <button id="refresh-accounts-btn" class="btn" type="button">重新整理</button>
        </div>
        <div style="overflow: auto">
          <table>
            <thead>
              <tr>
                <th>帳號</th>
                <th>角色</th>
                <th>啟用</th>
                <th>重設密碼</th>
                <th>更新</th>
                <th>刪除</th>
              </tr>
            </thead>
            <tbody id="accounts-body"></tbody>
          </table>
        </div>

        <div class="row toolbar" style="margin-top: 16px">
          <h2>操作紀錄</h2>
          <button id="refresh-audit-btn" class="btn" type="button">重新整理</button>
        </div>
        <div class="card" style="margin-top: 10px; margin-bottom: 12px; background: #fdfbf7">
          <div class="grid audit-filters">
            <label>
              分類
              <select id="audit-category-filter">
                <option value="">全部分類</option>
                <option value="auth">登入驗證</option>
                <option value="task">待辦事項</option>
                <option value="account">帳號管理</option>
                <option value="push">通知訂閱</option>
                <option value="today">今日概況</option>
                <option value="other">其他</option>
              </select>
            </label>
            <label>
              人員
              <select id="audit-actor-filter">
                <option value="">全部人員</option>
              </select>
            </label>
            <label>
              角色
              <select id="audit-role-filter">
                <option value="">全部角色</option>
                <option value="admin">admin</option>
                <option value="manager">manager</option>
                <option value="staff">staff</option>
              </select>
            </label>
            <label>
              動作
              <select id="audit-action-filter">
                <option value="">全部動作</option>
              </select>
            </label>
            <label>
              關鍵字
              <input id="audit-keyword-filter" type="text" placeholder="搜尋摘要/目標/內容細項" />
            </label>
          </div>
          <div class="row toolbar" style="margin-top: 8px">
            <span id="audit-filter-summary" class="status">目前顯示全部紀錄。</span>
            <button id="audit-clear-filter-btn" class="btn" type="button">清除篩選</button>
          </div>
        </div>
        <div style="overflow: auto">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>時間</th>
                <th>人員</th>
                <th>角色</th>
                <th>動作</th>
                <th>目標</th>
                <th>摘要</th>
                <th>內容細項</th>
              </tr>
            </thead>
            <tbody id="audit-body"></tbody>
          </table>
        </div>
        <p id="admin-status" class="status" style="margin-top: 10px"></p>
      </section>
    </main>

    <script>
      (function () {
        "use strict";

        const API_BASE =
          (typeof window !== "undefined" && typeof window.HANDOVER_CLOUD_API_BASE === "string"
            ? window.HANDOVER_CLOUD_API_BASE
            : "https://handover-cloud-api.spider10632.workers.dev"
          ).replace(/\/+$/, "");

        const state = {
          token: "",
          serverId: "",
          username: "",
          auditLogs: [],
        };

        const els = {
          loginCard: document.getElementById("login-card"),
          loginServer: document.getElementById("login-server"),
          loginPassword: document.getElementById("login-password"),
          loginBtn: document.getElementById("login-btn"),
          loginStatus: document.getElementById("login-status"),
          adminApp: document.getElementById("admin-app"),
          metaServer: document.getElementById("meta-server"),
          metaUser: document.getElementById("meta-user"),
          logoutBtn: document.getElementById("logout-btn"),
          newUsername: document.getElementById("new-username"),
          newPassword: document.getElementById("new-password"),
          newRole: document.getElementById("new-role"),
          createBtn: document.getElementById("create-btn"),
          createStatus: document.getElementById("create-status"),
          refreshAccountsBtn: document.getElementById("refresh-accounts-btn"),
          accountsBody: document.getElementById("accounts-body"),
          refreshAuditBtn: document.getElementById("refresh-audit-btn"),
          auditBody: document.getElementById("audit-body"),
          auditCategoryFilter: document.getElementById("audit-category-filter"),
          auditActorFilter: document.getElementById("audit-actor-filter"),
          auditRoleFilter: document.getElementById("audit-role-filter"),
          auditActionFilter: document.getElementById("audit-action-filter"),
          auditKeywordFilter: document.getElementById("audit-keyword-filter"),
          auditClearFilterBtn: document.getElementById("audit-clear-filter-btn"),
          auditFilterSummary: document.getElementById("audit-filter-summary"),
          adminStatus: document.getElementById("admin-status"),
        };

        els.loginBtn.addEventListener("click", onLogin);
        els.logoutBtn.addEventListener("click", onLogout);
        els.createBtn.addEventListener("click", onCreateAccount);
        els.refreshAccountsBtn.addEventListener("click", loadAccounts);
        els.refreshAuditBtn.addEventListener("click", loadAudit);
        els.auditCategoryFilter.addEventListener("change", renderAudit);
        els.auditActorFilter.addEventListener("change", renderAudit);
        els.auditRoleFilter.addEventListener("change", renderAudit);
        els.auditActionFilter.addEventListener("change", renderAudit);
        els.auditKeywordFilter.addEventListener("input", renderAudit);
        els.auditClearFilterBtn.addEventListener("click", clearAuditFilters);
        els.accountsBody.addEventListener("click", onAccountAction);

        async function onLogin() {
          setStatus(els.loginStatus, "登入中...");
          const serverId = normalizeName(els.loginServer.value);
          const password = String(els.loginPassword.value || "");
          if (!serverId || !password) {
            setStatus(els.loginStatus, "請輸入伺服器與密碼", true);
            return;
          }
          try {
            const result = await apiFetch("/v2/auth/login", {
              method: "POST",
              body: {
                serverId,
                password,
              },
            });
            if (!result.ok || !result.token) {
              throw new Error(result.error || "LOGIN_FAILED");
            }
            if (String(result.role || "") !== "admin") {
              throw new Error("FORBIDDEN_ROLE");
            }

            state.token = String(result.token || "");
            state.serverId = String(result.serverId || serverId);
            state.username = String(result.username || "");

            els.metaServer.textContent = state.serverId;
            els.metaUser.textContent = state.username;
            els.loginCard.classList.add("hidden");
            els.adminApp.classList.remove("hidden");
            setStatus(els.adminStatus, "登入成功，可開始管理帳號。", false, true);
            await Promise.all([loadAccounts(), loadAudit()]);
          } catch (error) {
            setStatus(els.loginStatus, mapLoginError(error), true);
          }
        }

        function onLogout() {
          state.token = "";
          state.serverId = "";
          state.username = "";
          els.loginPassword.value = "";
          els.loginCard.classList.remove("hidden");
          els.adminApp.classList.add("hidden");
          setStatus(els.loginStatus, "已登出。", false, true);
        }

        async function onCreateAccount() {
          const username = normalizeName(els.newUsername.value);
          const password = String(els.newPassword.value || "");
          const role = String(els.newRole.value || "").trim().toLowerCase();
          if (!username || !password) {
            setStatus(els.createStatus, "請輸入帳號與密碼", true);
            return;
          }
          try {
            await apiFetch("/v2/admin/" + encodeURIComponent(state.serverId) + "/accounts", {
              method: "POST",
              token: state.token,
              body: { username, password, role },
            });
            els.newUsername.value = "";
            els.newPassword.value = "";
            setStatus(els.createStatus, "新增成功", false, true);
            await Promise.all([loadAccounts(), loadAudit()]);
          } catch (error) {
            setStatus(els.createStatus, mapApiError(error), true);
          }
        }

        async function loadAccounts() {
          if (!state.token || !state.serverId) {
            return;
          }
          setStatus(els.adminStatus, "讀取帳號中...");
          try {
            const result = await apiFetch("/v2/admin/" + encodeURIComponent(state.serverId) + "/accounts", {
              method: "GET",
              token: state.token,
            });
            const list = Array.isArray(result.accounts) ? result.accounts : [];
            els.accountsBody.innerHTML = list
              .map(function (item) {
                const username = escapeHtml(item.username || "");
                const role = escapeHtml(item.role || "staff");
                const enabled = Boolean(item.enabled);
                return (
                  "<tr data-username=\"" +
                  username +
                  "\">" +
                  "<td class=\"mono\">" +
                  username +
                  "</td>" +
                  "<td><select data-field=\"role\"><option value=\"staff\"" +
                  (role === "staff" ? " selected" : "") +
                  ">staff</option><option value=\"manager\"" +
                  (role === "manager" ? " selected" : "") +
                  ">manager</option><option value=\"admin\"" +
                  (role === "admin" ? " selected" : "") +
                  ">admin</option></select></td>" +
                  "<td><input data-field=\"enabled\" type=\"checkbox\"" +
                  (enabled ? " checked" : "") +
                  " /></td>" +
                  "<td><input data-field=\"password\" type=\"password\" placeholder=\"留空不變更\" /></td>" +
                  "<td><button class=\"btn\" data-action=\"save\" type=\"button\">儲存</button></td>" +
                  "<td><button class=\"btn danger\" data-action=\"delete\" type=\"button\">刪除</button></td>" +
                  "</tr>"
                );
              })
              .join("");
            setStatus(els.adminStatus, "帳號已更新。", false, true);
          } catch (error) {
            setStatus(els.adminStatus, mapApiError(error), true);
          }
        }

        async function loadAudit() {
          if (!state.token || !state.serverId) {
            return;
          }
          try {
            const result = await apiFetch(
              "/v2/admin/" + encodeURIComponent(state.serverId) + "/audit?limit=200&offset=0",
              {
                method: "GET",
                token: state.token,
              },
            );
            state.auditLogs = Array.isArray(result.logs) ? result.logs : [];
            refreshAuditFilterOptions(state.auditLogs);
            renderAudit();
          } catch (error) {
            setStatus(els.adminStatus, mapApiError(error), true);
          }
        }

        function clearAuditFilters() {
          els.auditCategoryFilter.value = "";
          els.auditActorFilter.value = "";
          els.auditRoleFilter.value = "";
          els.auditActionFilter.value = "";
          els.auditKeywordFilter.value = "";
          renderAudit();
        }

        function refreshAuditFilterOptions(logs) {
          const actorSet = new Set();
          const actionSet = new Set();
          for (const log of logs) {
            const actor = String(log && log.actorUsername ? log.actorUsername : "").trim();
            const action = String(log && log.action ? log.action : "").trim();
            if (actor) actorSet.add(actor);
            if (action) actionSet.add(action);
          }
          fillSelectOptions(els.auditActorFilter, Array.from(actorSet).sort(), "全部人員");
          fillSelectOptions(els.auditActionFilter, Array.from(actionSet).sort(), "全部動作");
        }

        function fillSelectOptions(selectEl, values, allLabel) {
          if (!selectEl) return;
          const current = String(selectEl.value || "");
          const options = ['<option value="">' + escapeHtml(allLabel) + "</option>"];
          values.forEach(function (value) {
            options.push(
              '<option value="' +
                escapeHtml(value) +
                '"' +
                (value === current ? " selected" : "") +
                ">" +
                escapeHtml(value) +
                "</option>",
            );
          });
          selectEl.innerHTML = options.join("");
          if (!values.includes(current)) {
            selectEl.value = "";
          }
        }

        function renderAudit() {
          const logs = Array.isArray(state.auditLogs) ? state.auditLogs : [];
          const categoryFilter = String(els.auditCategoryFilter.value || "").trim();
          const actorFilter = String(els.auditActorFilter.value || "").trim();
          const roleFilter = String(els.auditRoleFilter.value || "").trim();
          const actionFilter = String(els.auditActionFilter.value || "").trim();
          const keywordFilter = String(els.auditKeywordFilter.value || "").trim().toLowerCase();

          const filtered = logs.filter(function (log) {
            const actor = String(log.actorUsername || "");
            const role = String(log.actorRole || "");
            const action = String(log.action || "");
            const category = getAuditCategory(action);
            const detailsText = formatAuditDetails(log.details, log.action);
            const keywordPool = (
              actor +
              "\n" +
              role +
              "\n" +
              action +
              "\n" +
              String(log.targetType || "") +
              "\n" +
              String(log.targetId || "") +
              "\n" +
              String(log.summary || "") +
              "\n" +
              detailsText
            ).toLowerCase();

            if (categoryFilter && category !== categoryFilter) return false;
            if (actorFilter && actor !== actorFilter) return false;
            if (roleFilter && role !== roleFilter) return false;
            if (actionFilter && action !== actionFilter) return false;
            if (keywordFilter && !keywordPool.includes(keywordFilter)) return false;
            return true;
          });

          if (!filtered.length) {
            els.auditBody.innerHTML =
              '<tr><td colspan="8" style="text-align:center; color:#7a6f5a; padding:14px;">查無符合條件的紀錄</td></tr>';
          } else {
            els.auditBody.innerHTML = filtered
              .map(function (log) {
                const detailsText = formatAuditDetails(log.details, log.action);
                return (
                  "<tr>" +
                  "<td class=\"mono\">" +
                  escapeHtml(String(log.id || "")) +
                  "</td>" +
                  "<td>" +
                  escapeHtml(formatDateTime(log.createdAt)) +
                  "</td>" +
                  "<td class=\"mono\">" +
                  escapeHtml(String(log.actorUsername || "")) +
                  "</td>" +
                  "<td>" +
                  escapeHtml(String(log.actorRole || "")) +
                  "</td>" +
                  "<td class=\"mono\">" +
                  escapeHtml(String(log.action || "")) +
                  "</td>" +
                  "<td>" +
                  escapeHtml(String(log.targetType || "") + (log.targetId ? ":" + log.targetId : "")) +
                  "</td>" +
                  "<td>" +
                  escapeHtml(String(log.summary || "")) +
                  "</td>" +
                  "<td class=\"cell-details\">" +
                  escapeHtml(detailsText).replace(/\n/g, "<br />") +
                  "</td>" +
                  "</tr>"
                );
              })
              .join("");
          }

          if (els.auditFilterSummary) {
            els.auditFilterSummary.textContent =
              "目前顯示 " + filtered.length + " / " + logs.length + " 筆紀錄。";
          }
        }

        function getAuditCategory(action) {
          const name = String(action || "");
          if (name.startsWith("auth_")) return "auth";
          if (name.startsWith("task_")) return "task";
          if (name.startsWith("account_")) return "account";
          if (name.startsWith("push_")) return "push";
          if (name.startsWith("today_")) return "today";
          return "other";
        }

        function formatAuditDetails(details, action) {
          if (details == null || details === "") return "-";

          if (typeof details === "string") {
            const trimmed = details.trim();
            if (
              (trimmed.startsWith("{") && trimmed.endsWith("}")) ||
              (trimmed.startsWith("[") && trimmed.endsWith("]"))
            ) {
              try {
                return formatAuditDetails(JSON.parse(trimmed), action);
              } catch (_) {
                return trimmed || "-";
              }
            }
            return trimmed || "-";
          }

          if (Array.isArray(details)) {
            if (!details.length) return "-";
            return details
              .map(function (item, index) {
                return index + 1 + ". " + detailValueToText(item);
              })
              .join("\n");
          }

          if (typeof details !== "object") {
            return String(details);
          }

          if (
            Object.prototype.hasOwnProperty.call(details, "previousAssignee") ||
            Object.prototype.hasOwnProperty.call(details, "nextAssignee")
          ) {
            return formatChangeLine("指派", formatAssignee(details.previousAssignee), formatAssignee(details.nextAssignee));
          }

          if (
            Object.prototype.hasOwnProperty.call(details, "previousStatus") ||
            Object.prototype.hasOwnProperty.call(details, "nextStatus")
          ) {
            return formatChangeLine("狀態", mapStatusLabel(details.previousStatus), mapStatusLabel(details.nextStatus));
          }

          if (
            Object.prototype.hasOwnProperty.call(details, "previousPinned") ||
            Object.prototype.hasOwnProperty.call(details, "nextPinned")
          ) {
            return formatChangeLine("置頂", boolToLabel(details.previousPinned), boolToLabel(details.nextPinned));
          }

          if (
            Object.prototype.hasOwnProperty.call(details, "previous") ||
            Object.prototype.hasOwnProperty.call(details, "next")
          ) {
            const previous = details.previous || null;
            const next = details.next || null;
            if (isTaskSnapshot(previous) || isTaskSnapshot(next)) {
              return formatTaskDiff(previous, next);
            }
            if (isTodayOverviewSnapshot(previous) || isTodayOverviewSnapshot(next)) {
              return formatTodayOverviewDiff(previous, next);
            }
            return formatChangeLine("內容", detailValueToText(previous), detailValueToText(next));
          }

          if (action === "auth_login") {
            return "登入成功";
          }

          const keys = Object.keys(details);
          if (!keys.length) return "-";
          return keys
            .map(function (key) {
              return mapDetailKeyLabel(key) + ": " + detailValueToText(details[key]);
            })
            .join("\n");
        }

        function formatTaskDiff(previous, next) {
          if (!previous && next) {
            return ["新增事項", formatTaskSnapshot(next)].join("\n");
          }
          if (previous && !next) {
            return ["刪除前事項", formatTaskSnapshot(previous)].join("\n");
          }
          if (!previous || !next) {
            return "-";
          }

          const lines = [];
          pushDiffLine(lines, "事項", normalizeEmpty(previous.title), normalizeEmpty(next.title));
          pushDiffLine(lines, "主分類", normalizeEmpty(previous.category), normalizeEmpty(next.category));
          pushDiffLine(lines, "子分類", normalizeEmpty(previous.subcategory), normalizeEmpty(next.subcategory));
          pushDiffLine(lines, "填寫人", normalizeEmpty(previous.owner), normalizeEmpty(next.owner));
          pushDiffLine(lines, "完成人", normalizeEmpty(previous.completedBy), normalizeEmpty(next.completedBy));
          pushDiffLine(lines, "狀態", mapStatusLabel(previous.status), mapStatusLabel(next.status));
          pushDiffLine(lines, "置頂", boolToLabel(previous.pinned), boolToLabel(next.pinned));
          pushDiffLine(lines, "全日", boolToLabel(previous.allDay), boolToLabel(next.allDay));
          pushDiffLine(lines, "開始時間", formatAuditDateTime(previous.startAt), formatAuditDateTime(next.startAt));
          pushDiffLine(lines, "結束時間", formatAuditDateTime(previous.endAt), formatAuditDateTime(next.endAt));
          pushDiffLine(lines, "內容", normalizeEmpty(previous.description), normalizeEmpty(next.description));

          if (!lines.length) {
            return "無欄位變更（可能為系統同步）";
          }
          return lines.join("\n");
        }

        function formatTodayOverviewDiff(previous, next) {
          if (!previous && next) {
            return ["今日概況（新）", formatTodayOverviewSnapshot(next)].join("\n");
          }
          if (previous && !next) {
            return ["今日概況（舊）", formatTodayOverviewSnapshot(previous)].join("\n");
          }
          if (!previous || !next) return "-";

          const lines = [];
          pushDiffLine(lines, "日期", normalizeEmpty(previous.dateKey), normalizeEmpty(next.dateKey));
          pushDiffLine(lines, "預進 Arr", normalizeEmpty(previous.checkin), normalizeEmpty(next.checkin));
          pushDiffLine(lines, "預退 Dep", normalizeEmpty(previous.checkout), normalizeEmpty(next.checkout));
          pushDiffLine(lines, "住房率 Occ", normalizeEmpty(previous.occupancy), normalizeEmpty(next.occupancy));
          return lines.length ? lines.join("\n") : "今日概況無變更";
        }

        function formatTaskSnapshot(task) {
          if (!task || typeof task !== "object") return "-";
          const lines = [];
          lines.push("事項: " + normalizeEmpty(task.title));
          lines.push("分類: " + normalizeEmpty(task.category) + " / " + normalizeEmpty(task.subcategory));
          lines.push("填寫人: " + normalizeEmpty(task.owner));
          lines.push("完成人: " + normalizeEmpty(task.completedBy));
          lines.push("狀態: " + mapStatusLabel(task.status));
          lines.push("時間: " + formatTaskTimeRange(task));
          lines.push("置頂: " + boolToLabel(task.pinned) + " | 全日: " + boolToLabel(task.allDay));
          lines.push("內容: " + normalizeEmpty(task.description));
          return lines.join("\n");
        }

        function formatTodayOverviewSnapshot(overview) {
          if (!overview || typeof overview !== "object") return "-";
          return [
            "日期: " + normalizeEmpty(overview.dateKey),
            "預進 Arr: " + normalizeEmpty(overview.checkin),
            "預退 Dep: " + normalizeEmpty(overview.checkout),
            "住房率 Occ: " + normalizeEmpty(overview.occupancy),
          ].join("\n");
        }

        function formatTaskTimeRange(task) {
          if (task && task.allDay) return "全天";
          const start = formatAuditDateTime(task && task.startAt ? task.startAt : "");
          const end = formatAuditDateTime(task && task.endAt ? task.endAt : "");
          if (start !== "-" && end !== "-") return start + " 至 " + end;
          if (start !== "-") return start;
          if (end !== "-") return "至 " + end;
          return "未設定";
        }

        function isTaskSnapshot(value) {
          return (
            value &&
            typeof value === "object" &&
            !Array.isArray(value) &&
            ("title" in value ||
              "category" in value ||
              "subcategory" in value ||
              "owner" in value ||
              "status" in value ||
              "startAt" in value ||
              "endAt" in value)
          );
        }

        function isTodayOverviewSnapshot(value) {
          return (
            value &&
            typeof value === "object" &&
            !Array.isArray(value) &&
            ("checkin" in value || "checkout" in value || "occupancy" in value || "dateKey" in value)
          );
        }

        function pushDiffLine(lines, label, previousValue, nextValue) {
          const before = normalizeEmpty(previousValue);
          const after = normalizeEmpty(nextValue);
          if (before === after) return;
          lines.push(label + ": " + before + " -> " + after);
        }

        function formatChangeLine(label, previousValue, nextValue) {
          const before = normalizeEmpty(previousValue);
          const after = normalizeEmpty(nextValue);
          if (before === after) {
            return label + ": " + after;
          }
          return label + ": " + before + " -> " + after;
        }

        function formatAssignee(value) {
          const name = normalizeEmpty(value);
          return name === "-" ? "未指定（公用）" : name;
        }

        function mapStatusLabel(status) {
          const value = String(status || "").trim().toLowerCase();
          if (value === "pending") return "待處理";
          if (value === "done") return "已完成";
          if (value === "cancelled") return "已取消";
          if (!value) return "-";
          return value;
        }

        function boolToLabel(value) {
          if (value === true) return "是";
          if (value === false) return "否";
          if (String(value || "") === "") return "-";
          return String(value);
        }

        function formatAuditDateTime(value) {
          if (!value) return "-";
          const time = new Date(value);
          if (Number.isNaN(time.getTime())) {
            return String(value);
          }
          return (
            time.getFullYear() +
            "/" +
            String(time.getMonth() + 1).padStart(2, "0") +
            "/" +
            String(time.getDate()).padStart(2, "0") +
            " " +
            String(time.getHours()).padStart(2, "0") +
            ":" +
            String(time.getMinutes()).padStart(2, "0")
          );
        }

        function mapDetailKeyLabel(key) {
          const map = {
            username: "帳號",
            role: "角色",
            enabled: "啟用",
            endpoint: "推播端點",
            passwordReset: "密碼重設",
            previous: "變更前",
            next: "變更後",
            previousAssignee: "原指派",
            nextAssignee: "新指派",
            previousStatus: "原狀態",
            nextStatus: "新狀態",
            previousPinned: "原置頂",
            nextPinned: "新置頂",
          };
          return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : key;
        }

        function detailValueToText(value) {
          if (value == null) return "-";
          if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
            return String(value);
          }
          if (Array.isArray(value)) {
            return value
              .map(function (item, index) {
                return index + 1 + ") " + detailValueToText(item);
              })
              .join(" ; ");
          }
          if (typeof value === "object") {
            if (isTaskSnapshot(value)) return formatTaskSnapshot(value);
            if (isTodayOverviewSnapshot(value)) return formatTodayOverviewSnapshot(value);
            const keys = Object.keys(value);
            if (!keys.length) return "-";
            return keys
              .map(function (key) {
                return mapDetailKeyLabel(key) + "=" + detailValueToText(value[key]);
              })
              .join(", ");
          }
          return String(value);
        }

        function normalizeEmpty(value) {
          const text = String(value == null ? "" : value).trim();
          return text || "-";
        }

        async function onAccountAction(event) {
          const button = event.target.closest("button[data-action]");
          if (!button) {
            return;
          }
          const row = button.closest("tr[data-username]");
          if (!row) {
            return;
          }
          const username = normalizeName(row.dataset.username || "");
          if (!username) {
            return;
          }
          const action = String(button.dataset.action || "");

          try {
            if (action === "save") {
              const role = String(row.querySelector("select[data-field=\"role\"]").value || "staff");
              const enabled = Boolean(row.querySelector("input[data-field=\"enabled\"]").checked);
              const password = String(row.querySelector("input[data-field=\"password\"]").value || "");
              const body = { role: role, enabled: enabled };
              if (password.trim()) {
                body.password = password;
              }
              await apiFetch(
                "/v2/admin/" + encodeURIComponent(state.serverId) + "/accounts/" + encodeURIComponent(username),
                {
                  method: "PATCH",
                  token: state.token,
                  body: body,
                },
              );
              setStatus(els.adminStatus, "已更新帳號：" + username, false, true);
            }
            if (action === "delete") {
              if (!window.confirm("確認刪除帳號 " + username + " ?")) {
                return;
              }
              await apiFetch(
                "/v2/admin/" + encodeURIComponent(state.serverId) + "/accounts/" + encodeURIComponent(username),
                {
                  method: "DELETE",
                  token: state.token,
                },
              );
              setStatus(els.adminStatus, "已刪除帳號：" + username, false, true);
            }
            await Promise.all([loadAccounts(), loadAudit()]);
          } catch (error) {
            setStatus(els.adminStatus, mapApiError(error), true);
          }
        }

        async function apiFetch(path, options) {
          const requestOptions = options || {};
          const headers = {
            "content-type": "application/json",
          };
          if (requestOptions.token) {
            headers.Authorization = "Bearer " + requestOptions.token;
          }
          const response = await fetch(API_BASE + path, {
            method: requestOptions.method || "GET",
            headers: headers,
            body: requestOptions.body ? JSON.stringify(requestOptions.body) : undefined,
          });
          const data = await response.json().catch(function () {
            return { ok: false, error: "INVALID_RESPONSE" };
          });
          if (!response.ok || !data || data.ok === false) {
            const code = String((data && data.error) || "REQUEST_FAILED");
            const error = new Error(code);
            error.code = code;
            throw error;
          }
          return data;
        }

        function mapLoginError(error) {
          const code = String(error && (error.code || error.message) ? error.code || error.message : "").toUpperCase();
          if (code.includes("INVALID_CREDENTIALS")) return "密碼錯誤";
          if (code.includes("FORBIDDEN_ROLE")) return "此帳號非 admin，無法登入後台";
          if (code.includes("FORBIDDEN_SERVER")) return "伺服器未授權";
          return "登入失敗：" + code;
        }

        function mapApiError(error) {
          const code = String(error && (error.code || error.message) ? error.code || error.message : "").toUpperCase();
          if (code.includes("ACCOUNT_EXISTS")) return "帳號已存在";
          if (code.includes("ACCOUNT_NOT_FOUND")) return "找不到該帳號";
          if (code.includes("CANNOT_DELETE_SELF")) return "不可刪除目前登入帳號";
          if (code.includes("CANNOT_DISABLE_SELF")) return "不可停用目前登入帳號";
          return "操作失敗：" + code;
        }

        function normalizeName(value) {
          return String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9_-]/g, "");
        }

        function formatDateTime(value) {
          if (!value) {
            return "-";
          }
          const time = new Date(value);
          if (Number.isNaN(time.getTime())) {
            return String(value);
          }
          return (
            time.getFullYear() +
            "/" +
            String(time.getMonth() + 1).padStart(2, "0") +
            "/" +
            String(time.getDate()).padStart(2, "0") +
            " " +
            String(time.getHours()).padStart(2, "0") +
            ":" +
            String(time.getMinutes()).padStart(2, "0") +
            ":" +
            String(time.getSeconds()).padStart(2, "0")
          );
        }

        function setStatus(el, text, isError, isOk) {
          if (!el) return;
          el.textContent = String(text || "");
          el.classList.remove("error");
          el.classList.remove("ok");
          if (isError) {
            el.classList.add("error");
          } else if (isOk) {
            el.classList.add("ok");
          }
        }

        function escapeHtml(value) {
          return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }
      })();
    </script>
  </body>
</html>
